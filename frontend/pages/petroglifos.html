<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Petroglifos — Museo Arqueológico Piedra Pintada</title>
  <meta name="description" content="Explora el catálogo completo de más de 150 petroglifos del Museo Arqueológico Piedra Pintada. Filtra por categoría, busca por nombre y descubre la historia de cada grabado rupestre.">
  <link rel="stylesheet" href="../css/estilos.css?v=4.0">
  <style>
    .catalogo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }
    .catalogo-controles {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .petroglifo-card {
      display: flex;
      flex-direction: column;
      background: var(--grad-card);
      border: 1px solid var(--glass-border);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      text-decoration: none;
      position: relative;
    }
    .petroglifo-card:hover {
      transform: translateY(-8px);
      border-color: rgba(140, 115, 85, 0.5);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    .petroglifo-card__img-wrap {
      width: 100%;
      height: 220px;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
    }
    .petroglifo-card__img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s ease;
    }
    .petroglifo-card:hover .petroglifo-card__img-wrap img {
      transform: scale(1.08);
    }
    .petroglifo-card__badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(20, 20, 20, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.35rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 2;
    }
    .petroglifo-card__content {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex: 1;
    }
    .petroglifo-card__title {
      font-family: var(--font-titulo);
      font-size: 1.4rem;
      color: var(--color-dorado-claro);
      margin: 0;
    }
    .petroglifo-card__meta {
      font-size: 0.85rem;
      color: var(--color-texto-3);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .petroglifo-card__desc {
      font-size: 0.95rem;
      color: var(--color-texto-2);
      line-height: 1.6;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Sin resultados */
    .sin-resultados {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--color-texto-3);
    }
    .sin-resultados span { font-size: 4rem; display: block; margin-bottom: 1rem; }
    
    /* Botón Cargar Más */
    .btn-cargar-mas {
      display: inline-flex;
      margin: 3rem auto 1rem;
      padding: 1rem 3rem;
      border-radius: 50px;
      background: rgba(140, 115, 85, 0.1);
      border: 1px solid rgba(140, 115, 85, 0.3);
      color: var(--color-dorado-claro);
      font-family: var(--font-cuerpo);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-cargar-mas:hover {
      background: rgba(140, 115, 85, 0.2);
      border-color: var(--color-dorado);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
<div class="bg-texture" aria-hidden="true"></div>
<div id="header-placeholder"></div>

<!-- Hero -->
<section class="page-hero" aria-labelledby="titulo-catalogo">
  <div class="container">
    <nav class="breadcrumb" aria-label="Ruta de navegación">
      <a href="../index.html">Inicio</a>
      <span class="breadcrumb__sep" aria-hidden="true">›</span>
      <span aria-current="page">Petroglifos</span>
    </nav>
    <span class="etiqueta">Colección completa</span>
    <h1 id="titulo-catalogo">Catálogo de Petroglifos</h1>
    <div class="divisor divisor--left"></div>
    <p class="subtitulo" style="margin-top:.5rem;">Más de 150 grabados rupestres catalogados. Cada uno, una ventana hacia la cosmovisión de nuestros ancestros.</p>
  </div>
</section>

<section class="section--sm">
  <div class="container">
    <!-- Controles -->
    <div class="catalogo-controles">
      <!-- Buscador -->
      <div class="buscador" style="flex:1;max-width:380px;">
        <span class="buscador__icono" aria-hidden="true"></span>
        <input type="search" class="form-input" id="buscador-petroglifos" placeholder="Buscar petroglifo..." aria-label="Buscar petroglifo">
      </div>

      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        <!-- El diseño anterior con vista grid/lista y filtros se simplificó por el nuevo estilo más unificado -->
      </div>
    </div>

    <!-- Grid de petroglifos -->
    <div class="catalogo-grid" id="grid-petroglifos" aria-label="Catálogo de petroglifos">

      <!-- Los datos se generan por JS -->

    </div>

    <!-- Botón Cargar Más -->
    <div style="text-align: center;">
      <button class="btn-cargar-mas" id="btn-cargar-mas" style="display: none;">Ver más petroglifos</button>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="../js/mock-data.js"></script>
<script src="../js/componentes.js?v=2.2"></script>
<script src="../js/api.js?v=1.3"></script>
<script src="../js/app.js?v=1.3"></script>
<script>
'use strict';

let PETROGLIFOS = [];
const POR_PAGINA = 12;
let paginaActual = 1;

const COLORES_CAT = {
  'Erosionado':      'badge--dorado',
  'Bien conservado': 'badge--verde',
  'Vandalizado':     'badge--rojo',
};
function colorCategoria(cat) { return COLORES_CAT[cat] || 'badge--gris'; }

const grid = document.getElementById('grid-petroglifos');
const btnCargarMas = document.getElementById('btn-cargar-mas');
let filtroActual = 'todos';
let busquedaActual = '';

function obtenerFiltrados() {
  return PETROGLIFOS.filter(p => {
    const coincideCat = filtroActual === 'todos' || p.categoria === filtroActual;
    const coincideBusq = !busquedaActual ||
      (p.nombre || '').toLowerCase().includes(busquedaActual) ||
      (p.descripcion || '').toLowerCase().includes(busquedaActual);
    return coincideCat && coincideBusq;
  });
}

function renderPetroglifos(reset = false) {
  const filtrados = obtenerFiltrados();
  
  if (reset) {
    grid.innerHTML = '';
  }

  const mostrarHasta = paginaActual * POR_PAGINA;
  const pagina = filtrados.slice((paginaActual - 1) * POR_PAGINA, mostrarHasta);

  if (!filtrados.length && reset) {
    grid.innerHTML = `<div class="sin-resultados"><span>🔍</span><p>No se encontraron petroglifos con ese criterio.</p></div>`;
    btnCargarMas.style.display = 'none';
    return;
  }

  const html = pagina.map(p => `
    <a href="petroglifo-detalle.html?id=${p.id}" class="petroglifo-card revelar" id="card-petroglifo-${p.id}">
      <div class="petroglifo-card__img-wrap">
        <img src="${(p.imagen_url || '').replace(/^\/assets\//, '../assets/') || '../assets/img/petroglifo-01.png'}" alt="${p.nombre}" loading="lazy">
        ${p.categoria ? `<span class="petroglifo-card__badge">${p.categoria}</span>` : ''}
      </div>
      <div class="petroglifo-card__content">
        <h3 class="petroglifo-card__title">${p.nombre}</h3>
        <div class="petroglifo-card__meta">
          <span>📍 ${p.estacion_nombre || 'Múltiples estaciones'}</span>
        </div>
        <p class="petroglifo-card__desc">${p.descripcion}</p>
      </div>
    </a>
  `).join('');

  if (reset) {
    grid.innerHTML = html;
  } else {
    grid.insertAdjacentHTML('beforeend', html);
  }

  // Lógica del botón Cargar Más
  if (mostrarHasta >= filtrados.length) {
    btnCargarMas.style.display = 'none';
  } else {
    btnCargarMas.style.display = 'inline-flex';
  }

  window.Museo && window.Museo.iniciarScrollReveal && window.Museo.iniciarScrollReveal();
  iniciarScrollReveal();
}

btnCargarMas.addEventListener('click', () => {
  paginaActual++;
  renderPetroglifos(false);
});

function iniciarScrollReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.revelar:not(.visible)').forEach(el => obs.observe(el));
}

// Buscador
document.getElementById('buscador-petroglifos').addEventListener('input', e => {
  busquedaActual = e.target.value.toLowerCase().trim();
  paginaActual = 1;
  renderPetroglifos(true);
});

// Chips de filtro
const chipsContainer = document.getElementById('filtros-chips');
if (chipsContainer) {
  chipsContainer.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#filtros-chips .chip').forEach(c => c.classList.remove('activo'));
    chip.classList.add('activo');
    filtroActual = chip.dataset.filtro;
    paginaActual = 1;
    renderPetroglifos(true);
  });
}

// Cambio de vista - Eliminado por nuevo diseño unificado

// Iniciar
document.addEventListener('DOMContentLoaded', async () => {
  try {
    PETROGLIFOS = await window.api.petroglifos.obtenerTodos();
    const chipTodos = document.querySelector('.chip[data-filtro="todos"]');
    if (chipTodos) chipTodos.textContent = `Todos (${PETROGLIFOS.length})`;
  } catch (e) {
    console.error(e);
  }
  paginaActual = 1;
  renderPetroglifos(true);
});
</script>
</body>
</html>
